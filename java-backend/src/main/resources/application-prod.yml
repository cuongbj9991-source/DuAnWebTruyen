spring:
  application:
    name: story-service
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    defer-datasource-initialization: true
  jackson:
    default-property-inclusion: non_null
  security:
    user:
      name: user
      password: password

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 86400000

logging:
  level:
    root: INFO
    com.doctruyen: INFO
    org.springframework.security: INFO
